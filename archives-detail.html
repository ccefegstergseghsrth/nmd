/**

 * @param {string} id   - 条目 id（如 'zhonglou'）
 * @param {number} num  - 图片序号（如 1, 2, 3）
 * @param {string} label - 图片说明文字

function generateGalleryImg(id, num, label, ratio) {
  ratio = ratio || 'r16x9';
  var src = 'images/archives/' + id + '/' + num + '.jpg';
  return '<div class="img-slot ' + ratio + '">' +
    '<img src="' + src + '" alt="' + label + '" ' +
      'onload="this.classList.add(\'loaded\')" ' +

      'loading="lazy">' +
    '<span class="img-placeholder-icon">&#x1F5BC;</span>' +
    '<span class="img-label">' + label + '</span>' +
  '</div>';
}

/**
 * 生成轮播图幻灯片 HTML
 */
function gallerySlideHTML(id, num, label) {
  var src = 'images/archives/' + id + '/' + num + '.jpg';
  return '<div class="gallery-slide">' +
    '<img src="' + src + '" alt="' + label + '" ' +

}

/**
 * 初始化画廊轮播
 * @param {string} id       - 条目 id
 * @param {number} count    - 图片数量
 * @param {string} title    - 标题
 */
function initGallery(id, count, title) {
  var trackEl = document.getElementById('galleryTrack');
  var dotsEl = document.getElementById('galleryDots');
  var counterEl = document.getElementById('galleryCounter');
  var prevBtn = document.getElementById('galleryPrev');
  var nextBtn = document.getElementById('galleryNext');
  var galleryEl = document.getElementById('heroGallery');

  if (!trackEl || count < 1) return;

  var current = 0;
  var timer = null;
  var startX = 0, moved = false;

  // 构建幻灯片
  for (var i = 1; i <= count; i++) {
    trackEl.innerHTML += gallerySlideHTML(id, i, title + ' — ' + i);
    if (dotsEl) {
      dotsEl.innerHTML += '<span class="gallery-dot' + (i === 1 ? ' active' : '') + '" data-index="' + (i - 1) + '"></span>';
    }
  }

  if (counterEl && count > 1) {
    counterEl.textContent = '1 / ' + count;
  }

  // 单张图片隐藏控件
  if (count <= 1) {
    if (prevBtn) prevBtn.style.display = 'none';
    if (nextBtn) nextBtn.style.display = 'none';
    if (dotsEl) dotsEl.style.display = 'none';
    if (counterEl) counterEl.style.display = 'none';
  }

  function goTo(idx) {
    if (idx < 0) idx = count - 1;
    if (idx >= count) idx = 0;
    current = idx;
    trackEl.style.transform = 'translateX(-' + (current * 100) + '%)';
    if (dotsEl) {
      var allDots = dotsEl.querySelectorAll('.gallery-dot');
      allDots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
    }
    if (counterEl) {
      counterEl.textContent = (current + 1) + ' / ' + count;
    }
  }

  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }

  if (prevBtn) prevBtn.addEventListener('click', function(e) { e.stopPropagation(); prev(); resetTimer(); });
  if (nextBtn) nextBtn.addEventListener('click', function(e) { e.stopPropagation(); next(); resetTimer(); });

  // 指示点点击
  if (dotsEl) {
    dotsEl.addEventListener('click', function(e) {
      var dot = e.target.closest('.gallery-dot');
      if (dot) { goTo(parseInt(dot.getAttribute('data-index'))); resetTimer(); }
    });
  }

  // 触摸滑动
  if (galleryEl) {
    galleryEl.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; moved = false; }, {passive: true});
    galleryEl.addEventListener('touchmove', function(e) { if (Math.abs(e.touches[0].clientX - startX) > 10) moved = true; }, {passive: true});
    galleryEl.addEventListener('touchend', function(e) {
      if (!moved) return;
      var diff = e.changedTouches[0].clientX - startX;
      if (diff > 40) prev();
      else if (diff < -40) next();
      if (Math.abs(diff) > 40) resetTimer();
    });
  }

  // 键盘控制
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') { prev(); resetTimer(); }
    else if (e.key === 'ArrowRight') { next(); resetTimer(); }
  });

  // 自动轮播
  function startTimer() {
    if (count <= 1) return;
    stopTimer();
    timer = setInterval(next, 5000);
  }
  function stopTimer() { if (timer) { clearInterval(timer); timer = null; } }
  function resetTimer() { stopTimer(); startTimer(); }

  // 鼠标悬停暂停
  if (galleryEl) {
    galleryEl.addEventListener('mouseenter', stopTimer);
    galleryEl.addEventListener('mouseleave', startTimer);
  }

  startTimer();
}
